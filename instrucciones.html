<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instrucciones | PagoFácil Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">
  <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="admin.html" class="logo">
        <span class="logo__mark">P</span>
        <span class="logo__text">Pago<span>Fácil</span></span>
      </a>
      <nav class="admin-nav" aria-label="Admin">
        <a href="admin.html">
          <span aria-hidden="true">🗂️</span> Dashboard
        </a>
        <a href="instrucciones.html" class="is-active">
          <span aria-hidden="true">📖</span> Instrucciones
        </a>
        <a href="index.html" target="_blank" rel="noopener">
          <span aria-hidden="true">🌐</span> Ver sitio
        </a>
      </nav>
      <div class="admin-sidebar__footer">
        <div class="admin-user">
          Sesión
          <strong id="adminUserName">Admin</strong>
        </div>
        <button type="button" class="btn--sidebar" id="btnLogout">Cerrar sesión</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <button type="button" class="admin-menu-btn" id="btnMenu" aria-label="Abrir menú">☰ Menú</button>
          <h1>Instrucciones de trámites</h1>
          <p>Guías paso a paso para realizar los trámites en línea. Añade, edita o elimina instrucciones.</p>
        </div>
        <div class="admin-topbar__actions">
          <button type="button" class="btn btn--primary" id="btnNuevaInstruccion">+ Nueva instrucción</button>
        </div>
      </div>

      <div id="instruccionesList" class="instrucciones-list" aria-live="polite"></div>
    </main>
  </div>

  <!-- Modal instrucción -->
  <div class="modal-overlay" id="modalInstruccion" role="dialog" aria-modal="true" aria-labelledby="modalInstruccionTitle">
    <div class="modal">
      <div class="modal__header">
        <h2 id="modalInstruccionTitle">Nueva instrucción</h2>
        <button type="button" class="modal-close" data-close-modal aria-label="Cerrar">&times;</button>
      </div>
      <form id="formInstruccion" class="form" novalidate>
        <input type="hidden" id="instruccionId" name="id" />
        <div class="form__group">
          <label for="instruccionTitulo">Título *</label>
          <input type="text" id="instruccionTitulo" name="titulo" required placeholder="Ej. Cómo pagar el agua en línea" maxlength="150" />
        </div>
        <div class="form__group">
          <label for="instruccionTramite">Trámite relacionado (opcional)</label>
          <select id="instruccionTramite" name="tramiteId">
            <option value="">— Sin vincular —</option>
          </select>
        </div>
        <div class="form__group">
          <label for="instruccionContenido">Instrucciones paso a paso *</label>
          <textarea id="instruccionContenido" name="contenido" rows="8" required placeholder="1. Entra al sitio oficial…&#10;2. Inicia sesión…&#10;3. Completa el formulario…"></textarea>
        </div>
        <div class="modal__actions">
          <button type="button" class="btn--secondary" data-close-modal>Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/admin-ui.js"></script>
  <script src="js/instrucciones-page.js"></script>
</body>
</html>
