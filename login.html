<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | PagoFácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <a href="index.html" class="logo" style="display:inline-flex;align-items:center;gap:.55rem;text-decoration:none;margin-bottom:1rem;font-family:var(--display);font-weight:700">
        <span class="logo__mark">P</span>
        <span class="logo__text">Pago<span style="color:#0d6e6e">Fácil</span></span>
      </a>
      <span class="role-pill">Admin y clientes</span>
      <h1>Iniciar sesión</h1>
      <p class="lead">Accede a tu panel. Los administradores y clientes usan este mismo ingreso; el sistema te lleva al panel correcto.</p>

      <div id="loginError" class="login-error" hidden role="alert"></div>

      <form id="formLogin" class="form" method="post" action="#">
        <div class="form__group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" autocomplete="username" required placeholder="tu@correo.com" />
        </div>
        <div class="form__group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="btnLogin">Entrar</button>
      </form>

      <p class="login-hint">
        <a href="index.html">← Volver al sitio público</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login, watchAuth, redirectByRole } from "./js/auth-service.js";

    const form = document.getElementById("formLogin");
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("btnLogin");

    // Si ya hay sesión, redirigir
    watchAuth((profile) => {
      if (profile) redirectByRole(profile);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      btn.disabled = true;
      btn.textContent = "Entrando…";

      try {
        const profile = await login(form.email.value, form.password.value);
        redirectByRole(profile);
      } catch (err) {
        console.error(err);
        let msg = "No se pudo iniciar sesión.";
        if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
          msg = "Correo o contraseña incorrectos.";
        } else if (err.code === "auth/too-many-requests") {
          msg = "Demasiados intentos. Espera un momento.";
        } else if (err.message) {
          msg = err.message;
        }
        errorEl.textContent = msg;
        errorEl.hidden = false;
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
