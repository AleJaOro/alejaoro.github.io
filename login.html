<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Iniciar sesión | PagoFácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <a href="index.html" class="logo" aria-label="Volver al sitio">
        <span class="logo__mark">P</span>
        <span class="logo__text">Pago<span>Fácil</span></span>
      </a>
      <h1>Panel de administración</h1>
      <p class="lead">Inicia sesión para gestionar trámites e instrucciones.</p>

      <div id="loginError" class="login-error" hidden role="alert"></div>

      <form id="formLogin" class="form" novalidate>
        <div class="form__group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" required placeholder="Admin" />
        </div>
        <div class="form__group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn--primary btn--full">Entrar al dashboard</button>
      </form>

      <p class="login-hint">
        <a href="index.html">← Volver al sitio público</a>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    (function () {
      if (PagoFacilAuth.isAuthenticated()) {
        window.location.replace("admin.html");
        return;
      }

      const form = document.getElementById("formLogin");
      const errorEl = document.getElementById("loginError");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errorEl.hidden = true;

        const usuario = form.usuario.value;
        const contrasena = form.contrasena.value;
        const result = PagoFacilAuth.login(usuario, contrasena);

        if (!result.ok) {
          errorEl.textContent = result.error;
          errorEl.hidden = false;
          form.contrasena.focus();
          return;
        }

        window.location.href = "admin.html";
      });
    })();
  </script>
</body>
</html>
