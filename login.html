<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Iniciar sesión | PagoFácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <a href="index.html" class="logo" aria-label="Volver al sitio">
        <span class="logo__mark">P</span>
        <span class="logo__text">Pago<span>Fácil</span></span>
      </a>
      <h1>Panel de administración</h1>
      <p class="lead">Inicia sesión para gestionar trámites e instrucciones.</p>

      <div id="loginError" class="login-error" hidden role="alert"></div>

      <form id="formLogin" class="form" method="post" action="#" autocomplete="on">
        <div class="form__group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" required placeholder="Admin" />
        </div>
        <div class="form__group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="btnLogin">Entrar al dashboard</button>
      </form>

      <p class="login-hint">
        <a href="index.html">← Volver al sitio público</a>
      </p>
    </div>
  </div>

  <!-- Auth inline: no depende de cargar un archivo externo -->
  <script>
    (function () {
      "use strict";

      var SESSION_KEY = "pagofacil_admin_session";
      var USER_OK = "Admin";
      var PASS_OK = "Pago2026";

      function isAuthenticated() {
        try {
          var raw = sessionStorage.getItem(SESSION_KEY);
          if (!raw) return false;
          var data = JSON.parse(raw);
          return !!(data && data.user);
        } catch (e) {
          return false;
        }
      }

      function login(usuario, contrasena) {
        var u = (usuario || "").trim();
        var p = contrasena || "";
        if (u === USER_OK && p === PASS_OK) {
          sessionStorage.setItem(
            SESSION_KEY,
            JSON.stringify({ user: u, at: Date.now() })
          );
          return { ok: true };
        }
        return { ok: false, error: "Usuario o contraseña incorrectos." };
      }

      // También disponible globalmente para el resto del panel
      window.PagoFacilAuth = window.PagoFacilAuth || {
        login: login,
        logout: function () {
          sessionStorage.removeItem(SESSION_KEY);
        },
        isAuthenticated: isAuthenticated,
        getUser: function () {
          try {
            var raw = sessionStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            return JSON.parse(raw).user || null;
          } catch (e) {
            return null;
          }
        },
        requireAuth: function () {
          if (!isAuthenticated()) {
            window.location.replace("login.html");
            return false;
          }
          return true;
        },
      };

      if (isAuthenticated()) {
        window.location.replace("admin.html");
        return;
      }

      var form = document.getElementById("formLogin");
      var errorEl = document.getElementById("loginError");

      function handleLogin(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }

        errorEl.hidden = true;
        errorEl.textContent = "";

        var usuario = document.getElementById("usuario").value;
        var contrasena = document.getElementById("contrasena").value;
        var result = login(usuario, contrasena);

        if (!result.ok) {
          errorEl.textContent = result.error;
          errorEl.hidden = false;
          document.getElementById("contrasena").focus();
          return false;
        }

        window.location.href = "admin.html";
        return false;
      }

      form.addEventListener("submit", handleLogin);
    })();
  </script>
</body>
</html>
